# =========================================================
# MODULE 4: APPLICATION CONFIGURATION
# =========================================================
#
# Spring Boot reads this file automatically on startup.
# You can override almost any default setting here.
# Format: key=value (this is .properties format; YAML .yml is also common)
#
# This file lives in:  src/main/resources/application.properties

# ---------------------------------------------------------
# SERVER CONFIGURATION
# ---------------------------------------------------------

# The port your embedded Tomcat server listens on.
# Default is 8080. Change this if port 8080 is already in use.
server.port=8080

# ---------------------------------------------------------
# LOGGING CONFIGURATION
# ---------------------------------------------------------

# Set the logging level for your application package.
# Levels (from most verbose to least): TRACE, DEBUG, INFO, WARN, ERROR
# INFO is a good default — shows startup messages but not internal details.
logging.level.com.dast.demo=INFO

# See every HTTP request received (useful for learning!)
logging.level.org.springframework.web=DEBUG

# ---------------------------------------------------------
# JACKSON (JSON) CONFIGURATION
# ---------------------------------------------------------

# Pretty-print JSON responses (easier to read in browser/Postman)
spring.jackson.serialization.indent-output=true

# ---------------------------------------------------------
# H2 IN-MEMORY DATABASE
# ---------------------------------------------------------
# H2 is an embedded SQL database that lives inside the JVM.
# Data resets every time you restart the app — perfect for demos.

# JDBC URL: "mem:dastdb" means an in-memory database named "dastdb"
# DB_CLOSE_DELAY=-1 keeps it alive as long as the JVM is running
spring.datasource.url=jdbc:h2:mem:dastdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql and data.sql on startup to create tables + seed data
spring.sql.init.mode=always

# Enable the H2 web console (optional — handy for debugging)
# Access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:dastdb   Username: sa   Password: (blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------
# SPRINGDOC OPENAPI CONFIGURATION (Stage 2B)
# ---------------------------------------------------------
# Springdoc reads your @RestController annotations and automatically
# generates an OpenAPI 3.0 specification (a JSON document listing
# every endpoint, its HTTP method, parameters, and response types).
#
# It also bundles Swagger UI — a web-based interactive API explorer.

# Path where the raw OpenAPI JSON spec is served.
# Default is /v3/api-docs — we set it explicitly for clarity.
# ZAP will import this URL to discover all endpoints automatically.
# Try it: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# Path where the Swagger UI web page is served.
# Default is /swagger-ui.html — we set it explicitly for clarity.
# This gives you a visual, interactive API explorer with "Try it out" buttons.
# Try it: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Enable/disable the Swagger UI page.
# Set to false in production to hide your API documentation from attackers.
# We keep it enabled because this is a learning/demo project.
springdoc.swagger-ui.enabled=true


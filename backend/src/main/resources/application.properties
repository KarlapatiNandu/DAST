# =========================================================
# MODULE 4: APPLICATION CONFIGURATION
# =========================================================
#
# Spring Boot reads this file automatically on startup.
# You can override almost any default setting here.
# Format: key=value (this is .properties format; YAML .yml is also common)
#
# This file lives in:  src/main/resources/application.properties

# ---------------------------------------------------------
# SERVER CONFIGURATION
# ---------------------------------------------------------

# The port your embedded Tomcat server listens on.
# Default is 8080. Change this if port 8080 is already in use.
server.port=8080

# ---------------------------------------------------------
# LOGGING CONFIGURATION
# ---------------------------------------------------------

# Set the logging level for your application package.
# Levels (from most verbose to least): TRACE, DEBUG, INFO, WARN, ERROR
# INFO is a good default — shows startup messages but not internal details.
logging.level.com.dast.demo=INFO

# See every HTTP request received (useful for learning!)
logging.level.org.springframework.web=DEBUG

# ---------------------------------------------------------
# JACKSON (JSON) CONFIGURATION
# ---------------------------------------------------------

# Pretty-print JSON responses (easier to read in browser/Postman)
spring.jackson.serialization.indent-output=true

# ---------------------------------------------------------
# H2 IN-MEMORY DATABASE
# ---------------------------------------------------------
# H2 is an embedded SQL database that lives inside the JVM.
# Data resets every time you restart the app — perfect for demos.

# JDBC URL: "mem:dastdb" means an in-memory database named "dastdb"
# DB_CLOSE_DELAY=-1 keeps it alive as long as the JVM is running
spring.datasource.url=jdbc:h2:mem:dastdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql and data.sql on startup to create tables + seed data
spring.sql.init.mode=always

# Enable the H2 web console (optional — handy for debugging)
# Access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:dastdb   Username: sa   Password: (blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


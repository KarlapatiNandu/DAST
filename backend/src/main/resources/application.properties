# =========================================================
# MODULE 4: APPLICATION CONFIGURATION
# =========================================================
#
# Spring Boot reads this file automatically on startup.
# You can override almost any default setting here.
# Format: key=value (this is .properties format; YAML .yml is also common)
#
# This file lives in:  src/main/resources/application.properties

# ---------------------------------------------------------
# SERVER CONFIGURATION
# ---------------------------------------------------------

# The port your embedded Tomcat server listens on.
# Default is 8080. Change this if port 8080 is already in use.
server.port=8080

# ---------------------------------------------------------
# LOGGING CONFIGURATION
# ---------------------------------------------------------

# Set the logging level for your application package.
# Levels (from most verbose to least): TRACE, DEBUG, INFO, WARN, ERROR
# INFO is a good default — shows startup messages but not internal details.
logging.level.com.dast.demo=INFO

# See every HTTP request received (useful for learning!)
logging.level.org.springframework.web=DEBUG

# ---------------------------------------------------------
# JACKSON (JSON) CONFIGURATION
# ---------------------------------------------------------

# Pretty-print JSON responses (easier to read in browser/Postman)
spring.jackson.serialization.indent-output=true

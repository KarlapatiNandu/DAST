# =============================================================================
# GRADLE WRAPPER PROPERTIES
# =============================================================================
#
# This file tells the Gradle wrapper (gradlew.bat) which version of Gradle
# to download and use. The wrapper ensures everyone on the team — and Jenkins
# — uses the EXACT same Gradle version, regardless of what's installed globally.
#
# WHY THE WRAPPER MATTERS FOR JENKINS:
#   Jenkins doesn't need Gradle installed on the server. It runs gradlew.bat,
#   which reads this file, downloads Gradle 8.14 if not cached, and uses it.
#   This guarantees reproducible builds everywhere.
#
# WHY GRADLE 8.14 (not 8.7 or 9.x)?
#   - Gradle 8.14 supports JDK 21 (and up to Java 24) ✅
#   - Gradle 9.x: Spring Boot 3.2.5's plugin is incompatible
#     with Gradle 9.x (uses removed APIs)
#   Conclusion: 8.14 = newest 8.x that works with BOTH JDK 21 AND Spring Boot 3.2.5
#
#   HISTORY: This project originally used JDK 24, which required Gradle 8.14
#   as the minimum (8.7 and 8.13 didn't support Java 24). We've since switched
#   to JDK 21 for Jenkins compatibility, but Gradle 8.14 remains a great choice.
#
# =============================================================================

# distributionBase + distributionPath:
#   Where to store the downloaded Gradle distribution on each machine.
#   GRADLE_USER_HOME defaults to ~/.gradle (or %USERPROFILE%\.gradle on Windows)
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists

# distributionUrl:
#   The URL to download Gradle from.
#   "bin" = binary-only (smaller download, ~150MB)
#   "all" = includes source code + docs (larger, ~300MB)
#   Gradle 8.14 supports JDK 21 (and up to Java 24) and is compatible with Spring Boot 3.2.5.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.14-bin.zip

# networkTimeout:
#   How long to wait (in milliseconds) when downloading the Gradle distribution.
#   10000ms = 10 seconds. Increase if you have a slow connection.
networkTimeout=10000

# retries + retryBackOffMs:
#   How many times to retry a failed download, and how long to wait between retries.
retries=0
retryBackOffMs=500

# validateDistributionUrl:
#   If true, validates the download URL uses HTTPS.
#   Security measure to prevent man-in-the-middle attacks during download.
validateDistributionUrl=true

# zipStoreBase + zipStorePath:
#   Where to cache the downloaded Gradle ZIP file.
#   Same as distribution but for the raw ZIP before extraction.
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

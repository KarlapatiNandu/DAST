# =============================================================================
# ZAP Automation Framework plan for the DAST Learning Lab.
# =============================================================================
# This YAML file is read by this Jenkins command:
#   zap.bat -cmd -addonupdate -autorun zap\zap-automation.yaml
# The plan replaces older -quickurl scans with a repeatable workflow.
# The OpenAPI job imports endpoints from Springdoc at /v3/api-docs.
# The spider job crawls the imported target to collect reachable pages.
# The passive scan wait job lets ZAP finish reading normal responses.
# The active scan job sends attack payloads to in-scope parameters.
# The report job writes a Jenkins-publishable HTML report.

# =============================================================================
# env: defines the target application and scan scope.
# =============================================================================
env:
  # contexts tells ZAP which URLs belong to this application.
  contexts:
    # The context is a named boundary for this learning API.
    - name: "DAST-API-Context"
      # urls lists the root URLs ZAP should treat as target application roots.
      urls:
        # Spring Boot runs on port 8080 in backend/application.properties.
        - "http://localhost:8080"
      # includePaths keeps ZAP focused on the local Spring Boot app.
      includePaths:
        # This regex means every path under http://localhost:8080 is in scope.
        - "http://localhost:8080/.*"
      # excludePaths is intentionally empty so the lab can show all findings.
      excludePaths: []

# =============================================================================
# jobs: defines the exact ZAP workflow from discovery to report.
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # Job 1: import OpenAPI endpoints generated by Springdoc.
  # ---------------------------------------------------------------------------
  - type: openapi
    # parameters configures where the spec is and where attacks should go.
    parameters:
      # apiUrl is the live JSON spec generated by the backend.
      apiUrl: "http://localhost:8080/v3/api-docs"
      # targetUrl is the host ZAP should attack after reading the spec.
      targetUrl: "http://localhost:8080"

  # ---------------------------------------------------------------------------
  # Job 2: spider the local target after OpenAPI import.
  # ---------------------------------------------------------------------------
  - type: spider
    # parameters controls the classic spider crawl.
    parameters:
      # context limits crawling to DAST-API-Context includePaths.
      context: "DAST-API-Context"
      # url is the starting page the spider crawls from.
      # Use /v3/api-docs instead of / because this REST API has no root handler
      # and / returns 404. The OpenAPI spec page gives the spider valid links.
      url: "http://localhost:8080/v3/api-docs"
      # maxDuration prevents a CI build from hanging forever.
      maxDuration: 5

  # ---------------------------------------------------------------------------
  # Job 3: wait for passive scan analysis to finish.
  # ---------------------------------------------------------------------------
  - type: passiveScan-wait
    # parameters controls how long to wait for the passive queue.
    parameters:
      # maxDuration is in minutes; this small API should finish quickly.
      maxDuration: 5

  # ---------------------------------------------------------------------------
  # Job 4: actively attack the discovered endpoints.
  # ---------------------------------------------------------------------------
  - type: activeScan
    # parameters scopes and limits the active scan.
    parameters:
      # context tells ZAP to attack only URLs in the lab context.
      context: "DAST-API-Context"
      # maxScanDurationInMins keeps the Jenkins build bounded.
      maxScanDurationInMins: 30
      # maxRuleDurationInMins of 0 means each enabled rule can finish normally.
      maxRuleDurationInMins: 0
    # policyDefinition controls which rules run and how strong they are.
    policyDefinition:
      # defaultStrength medium is a good CI balance between speed and coverage.
      defaultStrength: "medium"
      # defaultThreshold medium reduces noisy low-confidence findings.
      defaultThreshold: "medium"
      # rules lists the lab-critical ZAP rule IDs explicitly.
      rules:
        # 40018 is SQL Injection, expected on POST /api/login.
        - id: 40018
          # threshold medium reports meaningful SQLi evidence without too much noise.
          threshold: "medium"
          # strength high gives SQLi enough payload variety for the vulnerable H2 query.
          strength: "high"
        # 40012 is Cross Site Scripting (Reflected), expected on /api/greet and /api/echo.
        - id: 40012
          # threshold medium balances confidence and learning value.
          threshold: "medium"
          # strength high helps ZAP try enough reflected XSS payloads.
          strength: "high"
        # 40014 is Cross Site Scripting (Persistent), enabled for XSS coverage completeness.
        - id: 40014
          # threshold medium keeps this rule active without reporting every weak signal.
          threshold: "medium"
          # strength medium is enough because this demo focuses on reflected XSS.
          strength: "medium"

  # ---------------------------------------------------------------------------
  # Job 5: write the HTML report for Jenkins.
  # ---------------------------------------------------------------------------
  - type: report
    # parameters controls report format and destination.
    parameters:
      # traditional-html is the full human-readable ZAP report template.
      template: "traditional-html"
      # reportDir is relative to the YAML plan file location (zap/ folder).
      # Use "../zap-reports" to navigate up to the workspace root level.
      reportDir: "../zap-reports"
      # reportFile must match the Jenkinsfile publishHTML reportFiles value.
      reportFile: "zap-automation-report.html"
      # reportTitle appears at the top of the report.
      reportTitle: "DAST Learning Lab - ZAP Automation Framework Report"
      # reportDescription explains that endpoint discovery came from OpenAPI.
      reportDescription: "OpenAPI-driven scan of SQLi and XSS training endpoints."
      # displayReport stays false because Jenkins runs ZAP in headless mode.
      displayReport: false

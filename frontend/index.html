<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO: Clear, descriptive title -->
    <title>DAST Learning App – Spring Boot + React</title>
    <meta name="description" content="A simple learning app to explore Spring Boot REST APIs and OWASP ZAP security testing." />
  </head>
  <body>
    <!--
      This single <div id="root"> is where React mounts your entire app.
      React's virtual DOM replaces this element's contents at runtime.
      You won't see your components in this HTML file — they live in /src.
    -->
    <div id="root"></div>

    <!--
      Vite processes this module script during build.
      main.jsx is the React entry point — it renders <App /> into #root.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
